<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phần mềm điểm danh</title>
<link rel="icon" href="/icon.png" type="image/x-icon">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/5.3.0/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.datatables.net/2.0.3/css/dataTables.bootstrap5.css">
<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
<style>
  body {
    background-image: url("study.jpg");
    background-size: cover;
    background-repeat: no-repeat;
    background-position: center;
    height: 100vh; /* Set the height of the body to fill the entire viewport */
  }
  #header{
    display: flex;
    justify-content: space-between;
  }
  #example{
    background-color: #fff;
  }
  .title{
    margin-bottom: 25px;
  }
  .container {
    margin-top: 50px;
    width: 100%;
    height: 100%;
  }
  .form-group {
    margin-bottom: 20px;
  }
  .form-control {
    border-color: #cfe2f3;
    color: #495057;
  }
  .btn-primary {
    background-color: #17a2b8;
    border-color: #17a2b8;
  }
  .btn-primary:hover {
    background-color: #138496;
    border-color: #138496;
  }
  .footer {
    background-color: #f8f9fa;
    padding: 20px;
    text-align: center;
  }
</style>
</head>
<body>
<nav id="header" class="navbar navbar-expand-lg navbar-light bg-light">
  <a class="navbar-brand" href="#">PHẦN MỀM ĐIỂM DANH SINH VIÊN</a>
  <button onclick="backHome()" class="btn btn-primary">Quay lại</button>
</nav>
<div class="container">
  <h3 class="title">Lịch sử điểm danh</h3>
  <table id="example" class="table table-striped" style="width:100%">
    <thead>
      <tr>
        <th style="width: 5%">STT</th>
        <th style="width: 30%">Mã sinh viên</th>
        <th style="width: 20%">Họ tên</th>
        <th style="width: 30%">Thời gian điểm danh</th>
      </tr>
    </thead>
    <tbody class="data">

    </tbody>
  </table>

</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
<script src="https://code.jquery.com/jquery-3.7.1.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.datatables.net/2.0.3/js/dataTables.js"></script>
<script src="https://cdn.datatables.net/2.0.3/js/dataTables.bootstrap5.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.2/moment.min.js"></script>
<script>
  function backHome(){
      window.location.href = 'attendance.html';
  }
  const tableData = document.querySelector('.data');
  let token = window.localStorage.getItem('token');
  function getData(){
    fetch(`http://localhost:8222/attendance/all`,{
        method: 'GET',
        headers: {Authorization: `Bearer ${token}`},
      })
      .then(response => response.json())
      .then(result => {
        console.log(result);
        new DataTable('#example', {
          "data": result,
          "columns": [
            {
              "data":'stt',
              "render": function ( data, type, full, meta ) {
                return  meta.row + 1;
              }
            },
            {"data":'msv'},
            {"data":'name'},
            {
              "data": "currentTime",
              "render": function(data, type, row){
                if(type === "sort" || type === "type"){
                    return data;
                }
                return moment(data).format("DD/MM/YYYY HH:mm:ss");
              }
            },
          ],

        });
      })
      .catch(error => console.log('error', error));
  }
  getData();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <i class="fas fa-check"></i>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng kí</title>
    <link rel="icon" href="/icon.png" type="image/x-icon">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        body {
            background-image: url("study.jpg");
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
            height: 100vh;
        }

        #header {
            display: flex;
            justify-content: space-between;
        }

        .container {
            margin-top: 50px;
        }

        #attendanceForm {
            margin: auto;
            width: 50%;
        }

        #attendanceCode {
            margin-bottom: 35px;
            font-size: 25px;
            font-weight: bold;
        }

        .content {
            text-align: center;
            font-size: 20px;
            font-weight: bold;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-control {
            border-color: #cfe2f3;
            color: #495057;
        }

        .btn-primary {
            background-color: #17a2b8;
            border-color: #17a2b8;
        }

        .btn-primary:hover {
            background-color: #138496;
            border-color: #138496;
        }

        .error-message {
            color: red;
            font-size: 14px;
            margin-top: 5px;
        }

        .footer-form{
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .footer {
            background-color: #f8f9fa;
            padding: 20px;
            text-align: center;
        }
    </style>
</head>

<body>
    <nav id="header" class="navbar navbar-expand-lg navbar-light bg-light">
        <a class="navbar-brand" href="#">PHẦN MỀM ĐIỂM DANH SINH VIÊN</a>
    </nav>
    <div class="container">
        <h1 class="text-center mb-4"><strong>Đăng ký</strong></h1>

        <form id="attendanceForm">
            <div class="form-group">
                <label for="hoTen"><strong>Họ và tên:</strong></label>
                <input type="text" class="form-control" id="hoTen" placeholder="Nhập họ và tên" required>
            </div>
            <div class="form-group">
                <label for="maSinhVien"><strong>Mã sinh viên:</strong></label>
                <input type="text" class="form-control" id="maSinhVien" placeholder="Nhập mã sinh viên" required>
            </div>
            <div class="form-group">
                <label for="matKhau"><strong>Mật khẩu:</strong></label>
                <input type="password" class="form-control" id="matKhau" placeholder="Nhập mật khẩu" required>
            </div>
            <div class="form-group">
                <label for="email"><strong>Email:</strong></label>
                <input type="email" class="form-control" id="email" placeholder="Nhập địa chỉ email" required>
            </div>
            <div class="form-group">
                <label for="anhDaiDien"><strong>Hình ảnh khuôn mặt:</strong></label>
                <div class="custom-file">
                    <input type="file" class="custom-file-input" id="anhDaiDien" name="anhDaiDien" accept="image/*"
                        required onchange="displaySelectedFileName()">
                    <label class="custom-file-label" for="anhDaiDien" id="selectedFileName">Chọn tập tin ảnh...</label>
                </div>
            </div>
            <div class="footer-form">
                <button style="width: 30%;" type="button" class="btn btn-primary" onclick="registerStudent()"><strong>Đăng ký</strong></button>
                <div class="link-login">Đã có tài khoản ? <a href="login.html">Đăng nhập ở đây</a></div>
            </div>
        </form>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>

    <script>
        function displaySelectedFileName() {
            const selectedFile = document.getElementById('anhDaiDien').files[0];
            const selectedFileNameLabel = document.getElementById('selectedFileName');
            selectedFileNameLabel.textContent = selectedFile.name;
        }
    </script>

    <!-- Link Axios -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script> 
        function registerStudent() {
            const formData = new FormData();
            formData.append('name', document.getElementById('hoTen').value);
            formData.append('msv', document.getElementById('maSinhVien').value);
            formData.append('pass', document.getElementById('matKhau').value);
            formData.append('email', document.getElementById('email').value);
            formData.append('file', document.getElementById('anhDaiDien').files[0]);

            axios.post('http://localhost:8222/auth/register', formData, {
                headers: {
                    'Content-Type': 'multipart/form-data'
                }
            })
                .then(response => {
                    console.log('Success:', response.data);
                    // Xử lý phản hồi thành công từ server (nếu cần)
                    alert(response.data)
                })
                .catch(error => {
                    console.error('Error:', error);
                    // Xử lý lỗi từ server (nếu cần)
                    alert('Đã có lỗi xảy ra');
                });
        }
    </script>

</body>

</html>
